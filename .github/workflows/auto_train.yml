name: AI Auto-Training Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # รันอัตโนมัติทุกๆ เที่ยงคืนวันอาทิตย์
  workflow_dispatch: # ปุ่มกดรันเอง Manual

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์บอทบันทึกไฟล์กลับเข้า GitHub ได้เลย
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run XGBoost & Random Forest Training
      run: python train_model.py
      
    - name: Run PPO (Reinforcement Learning) Training
      run: python train_rl.py
      
    - name: Commit and Push AI Models
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add xgboost_model.pkl rf_model.pkl ppo_gold_bot.zip
        git commit -m "🤖 Auto-update AI ensemble models" || echo "No changes to commit"
        git push

name: AI Auto-Training Pipeline

on:
  schedule:
    - cron: '0 0 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy xgboost scikit-learn

      - name: Run AI Training Script
        run: python train_model.py

      - name: Commit and Push Updated Brain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "AI-Auto-Trainer"
          git config --global user.email "bot@github.actions"
          git add gold_champion_macro.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Auto Update: Retrained AI Model"
            git push origin main
          fi

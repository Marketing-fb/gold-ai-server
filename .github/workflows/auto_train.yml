import yfinance as yf
import pandas as pd
import numpy as np
import xgboost as xgb
from datetime import datetime
import warnings
warnings.filterwarnings('ignore')

print("🚀 Starting Automated AI Training Process...")

# 1. Download Data
print("📊 Fetching latest market data from Yahoo Finance...")
tickers = {
    'Gold': 'GC=F',
    'DXY': 'DX-Y.NYB',
    'US10Y': '^TNX',
    'SP500': '^GSPC'
}

data_frames = []
for name, ticker in tickers.items():
    df = yf.download(ticker, period="10y", interval="1d")
    
    # yfinance รุ่นใหม่จะคืนค่าเป็น MultiIndex ทำให้พังเวลาคำนวณ
    # เราต้องดึงแค่ค่า Close ออกมาเป็น Series เดี่ยวๆ ให้ได้
    if isinstance(df.columns, pd.MultiIndex):
        series = df['Close'].iloc[:, 0]
    else:
        series = df['Close']
        
    series.name = name
    data_frames.append(series.to_frame())

# Merge all data
merged_data = data_frames[0]
for df in data_frames[1:]:
    merged_data = merged_data.join(df, how='inner')

merged_data.dropna(inplace=True)
print(f"✅ Data fetched successfully. Total rows: {len(merged_data)}")

# 2. Feature Engineering (Macro + Technical)
print("⚙️ Engineering Features...")
data = merged_data.copy()

# Returns
data['Return_1d'] = data['Gold'].pct_change(1)
data['Return_3d'] = data['Gold'].pct_change(3)

# Moving Averages & Trend
data['SMA_20'] = data['Gold'].rolling(window=20).mean()
data['Trend_Distance'] = (data['Gold'] - data['SMA_20']) / data['SMA_20']

# Volatility
data['Volatility_10d'] = data['Return_1d'].rolling(window=10).std()

# Macro Changes
data['DXY_Change'] = data['DXY'].pct_change(1)
data['US10Y_Change'] = data['US10Y'].pct_change(1)

# Drop NaNs created by rolling/pct_change
data.dropna(inplace=True)

# Define Target (1 if next day price goes UP, 0 if DOWN)
data['Target'] = np.where(data['Gold'].shift(-1) > data['Gold'], 1, 0)
# Drop the last row because target is NaN
data = data.iloc[:-1]

# 3. Model Training
print("🧠 Training XGBoost Model...")
features = ['Return_1d', 'Return_3d', 'Trend_Distance', 'Volatility_10d', 'DXY', 'US10Y', 'DXY_Change', 'US10Y_Change']
X = data[features]
y = data['Target']

# Initialize and train model
model = xgb.XGBClassifier(
    n_estimators=100,
    learning_rate=0.05,
    max_depth=4,
    subsample=0.8,
    colsample_bytree=0.8,
    random_state=42
)

model.fit(X, y)
accuracy = model.score(X, y)
print(f"🎯 Training completed. In-sample Accuracy: {accuracy*100:.2f}%")

# 4. Save the Model
model_filename = 'gold_champion_macro.json'
model.save_model(model_filename)
print(f"💾 Model successfully saved to {model_filename}")
print("✨ Automated Training Pipeline Finished Successfully!")
